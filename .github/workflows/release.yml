name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: vscode-git-fixup-panel

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag targets a commit on main
        run: |
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Tagged commit is not on the main branch. Publish aborted."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: vscode-git-fixup-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a valid semver (vX.Y.Z). Aborting."
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package extension
        run: npx vsce package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-git-fixup-panel/*.vsix
